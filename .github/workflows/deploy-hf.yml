name: Deploy to HF Spaces

on:
  push:
    branches: [main]
    paths:
      - "hf-space/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf-space
          git init -b main
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add hf https://Kohkiota:$HF_TOKEN@huggingface.co/spaces/komail9/skin-lesion-triage
          git add .
          git commit -m "Deploy from GitHub Actions ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
          git push hf main --force
